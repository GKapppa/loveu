server:
  port: 0

springdoc:
  api-docs:
    path: /interaccion/api-docs

spring:
  autoconfigure:
    exclude:
      - org.springdoc.core.configuration.SpringDocHateoasConfiguration
  application:
    name: interaccion
  flyway:
    enabled: 'true'
    baseline-on-migrate: 'true'
  jpa:
    show-sql: 'true'
    properties:
      hibernate:
        format_sql: 'true'
    hibernate:
      ddl-auto: validate
  profiles:
    active: dev

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/interaccion_db?createDataBaseIfNotExist=true
    username: root
    password: ''

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5433/interaccion_db_test?createDataBaseIfNotExist=true
    username: root
    password: ''
  jpa:
    hibernate:
      ddl-auto: update

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5433/interaccion_db_prod?createDataBaseIfNotExist=true
    username: root
    password: ''
  jpa:
    hibernate:
      ddl-auto: none
