spring:
  application:
    name: reporte
  datasource:
    url: jdbc:postgresql://localhost:5432/reporte_db
    username: root
    password: ''
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: 'true'
    properties:
      hibernate:
        format_sql: 'true'
  flyway:
    enabled: 'true'
    baseline-on-migrate: 'true'
server:
  port: '8083'
