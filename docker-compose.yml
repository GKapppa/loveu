version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loveu-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  eureka:
    build: ./eureka
    container_name: loveu-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8761 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  usuarios:
    build: ./usuarios
    container_name: loveu-usuarios
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usuarios_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
  
  interaccion:
    build: ./interaccion
    container_name: loveu-interaccion
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interaccion_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
  
  reporte:
    build: ./reporte
    container_name: loveu-reporte
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reporte_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
  
  gateway:
    build: ./gateway
    container_name: loveu-gateway
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - eureka
      - usuarios
      - interaccion
      - reporte

volumes:
  postgres-data: